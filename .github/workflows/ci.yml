name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Quality (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        elixir: ["1.18"]
        otp: ["27"]
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: deps-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: build-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: build-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Restore PLT cache
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: plts-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: plts-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-

      - run: mix deps.get

      - run: mix format --check-formatted

      - run: mix credo --strict

      - run: mix dialyzer

  test:
    name: Test (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.17"
            otp: "25"
          - elixir: "1.17"
            otp: "27"
          - elixir: "1.18"
            otp: "25"
          - elixir: "1.18"
            otp: "27"
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: deps-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: build-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: build-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-

      - run: mix deps.get

      - run: mix compile --warnings-as-errors

      - run: mix test --warnings-as-errors

  tck:
    name: TCK Compliance
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"

      - uses: astral-sh/setup-uv@v5

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-1.18-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: deps-${{ runner.os }}-1.18-27-

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: build-${{ runner.os }}-1.18-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: build-${{ runner.os }}-1.18-27-

      - name: Cache TCK repo
        uses: actions/cache@v4
        with:
          path: .tck
          key: tck-${{ hashFiles('bin/tck') }}

      - run: mix deps.get

      - run: mix compile

      - name: Start TCK server
        run: mix run test/tck/server.exs &

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9999/.well-known/agent-card.json > /dev/null 2>&1; then
              echo "Server ready"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start"
          exit 1

      - name: Clone TCK
        run: |
          if [ ! -d .tck ]; then
            git clone https://github.com/a2aproject/a2a-tck.git .tck
          fi

      - name: Install TCK dependencies
        run: |
          cd .tck
          uv venv
          uv pip install -e .

      - name: Run TCK (mandatory)
        run: |
          cd .tck
          uv run ./run_tck.py \
            --sut-url http://localhost:9999 \
            --category mandatory
